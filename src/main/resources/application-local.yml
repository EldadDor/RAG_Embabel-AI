# ============================================================
# LOCAL profile — Ollama (nomic-embed-text + llama3) + Qdrant
# Start infra:  docker-compose -f docker/docker-compose.yml up -d
# Run app:      SPRING_PROFILES_ACTIVE=local mvn spring-boot:run
# ============================================================
spring:
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}

      # ── Embedding model (768-dim) ────────────────────────
      embedding:
        model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
        options:
          num-ctx: 8192

      # ── Chat model ───────────────────────────────────────
      chat:
        model: ${OLLAMA_CHAT_MODEL:llama3}
        options:
          temperature: 0.2
          num-ctx: 4096

    # ── Vector store: Qdrant ─────────────────────────────────
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_GRPC_PORT:6334}          # Spring AI uses gRPC port
        collection-name: ${RAG_COLLECTION:rag-poc-chunks-local}
        initialize-schema: true
        # NOTE: nomic-embed-text produces 768-dim vectors.
        # Qdrant auto-detects dimensions on first vectorStore.add() call.
        # A separate collection (rag-poc-chunks-local) avoids conflicts
        # with the work profile's 1536-dim pgvector table.

logging:
  level:
    org.springframework.ai.ollama: DEBUG
