# ============================================================
# LOCAL profile — Ollama (nomic-embed-text + llama3.2:3b) on laptop + pgvector locally
#
# Topology:
#   Laptop  (10.100.102.12): Ollama  → http://10.100.102.12:11434  (embedding + chat)
#   Desktop (this machine) : pgvector → localhost:5432
#
# Start app:
#   SPRING_PROFILES_ACTIVE=local mvn spring-boot:run
#
# Pre-flight checklist:
#   On laptop: ollama pull nomic-embed-text  &&  ollama pull llama3.2:3b
#   On desktop: docker-compose -f docker/docker-compose-pgvector.yml up -d
#   curl http://10.100.102.12:11434          <- must respond
# ============================================================
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.ai.model.chat.memory.repository.jdbc.autoconfigure.JdbcChatMemoryRepositoryAutoConfiguration

  datasource:
    url: ${PGVECTOR_URL:jdbc:postgresql://localhost:5432/ragdb}
    username: ${PGVECTOR_USER:rag_app}
    password: ${PGVECTOR_PASSWORD:rag_app_password}
    driver-class-name: org.postgresql.Driver

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://10.100.102.12:11434}

      # -- Embedding model (768-dim) ---------------------------------
      # nomic-embed-text produces 768-dim vectors.
      embedding:
        model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
        options:
          num-ctx: 512

      # -- Chat model ------------------------------------------------
      chat:
        model: ${OLLAMA_CHAT_MODEL:llama3.2:3b}
        options:
          temperature: 0.1
          num-ctx: 2048
          num-predict: 512

    # -- Vector store: pgvector (local Docker) ----------------------
    vectorstore:
      pgvector:
        schema-name: rag
        table-name: document_chunks
        dimensions: 768                     # nomic-embed-text = 768 dims
        distance-type: COSINE_DISTANCE
        initialize-schema: false            # schema managed by init-rag-pgvector.sql

logging:
  level:
    org.springframework.ai.ollama: DEBUG
    org.springframework.ai.vectorstore.pgvector: DEBUG