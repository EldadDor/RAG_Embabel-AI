# docker/docker-compose.yml
# Start: docker-compose -f docker/docker-compose.yml up -d
# Health: curl -s http://localhost:6333/healthz
# Qdrant dashboard: http://localhost:6333/dashboard

version: "3.9"
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"   # REST + dashboard
      - "6334:6334"   # gRPC (Spring AI uses this)
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # After start, pull the model:
    # docker exec -it rag-ollama ollama pull llama3

volumes:
  qdrant_storage:
  ollama_models:
