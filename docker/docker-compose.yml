# docker/docker-compose.yml
# Start (Podman):  podman-compose -f docker/docker-compose.yml up -d
# Start (Docker):  docker-compose -f docker/docker-compose.yml up -d
# Health:          curl -s http://localhost:6333/healthz
# Qdrant dashboard: http://localhost:6333/dashboard
#
# Podman notes:
#   - Images must be fully qualified (docker.io/...) — Podman has no implicit registry
#   - CNI "firewall" plugin warning is cosmetic on WSL2/Windows; containers still start
#   - If CNI warnings persist, edit /home/<user>/.config/cni/net.d/docker_default.conflist
#     and change "cniVersion": "1.0.0" → "0.4.0"

version: "3.9"
services:
  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"   # REST + dashboard
      - "6334:6334"   # gRPC (Spring AI uses this)
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # After start, pull the model:
    # podman exec -it rag-ollama ollama pull llama3

volumes:
  qdrant_storage:
  ollama_models:
